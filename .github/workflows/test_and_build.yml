name: Test and Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite:///./test.db
      SECRET_KEY: testsecret
      ALGORITHM_JWT: HS256
      ACCESS_TOKEN_EXPIRE: 7

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    - name: Install uv
      uses: astral-sh/setup-uv@v7
    - name: Install dependencies
      run: |
        uv sync --frozen
    - name: Lint with ruff
      run: |
        uv run ruff check
    - name: Test with pytest
      run: |
        uv run pytest
    - name: Run Type Check
      run: | 
        uv run mypy .